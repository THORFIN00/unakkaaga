<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unakkaaga</title>

<style>
body {
margin:0;
padding:0;
background:black;
color:white;
font-family: Arial, sans-serif;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
text-align:center;
z-index:2;
}

h1{
font-size:48px;
margin-bottom:10px;
}

p{
font-size:18px;
opacity:0.8;
}

button{
margin-top:20px;
padding:12px 25px;
background:transparent;
border:1px solid white;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:white;
color:black;
}

/* stars */

.stars {
position:absolute;
width:1px;
height:1px;
background:transparent;
box-shadow:
100px 200px #fff,
200px 300px #fff,
300px 100px #fff,
400px 400px #fff,
500px 200px #fff,
600px 300px #fff,
700px 150px #fff,
800px 250px #fff,
900px 350px #fff,
1000px 100px #fff,
1100px 200px #fff,
1200px 300px #fff,
1300px 150px #fff,
1400px 250px #fff,
1500px 350px #fff;
animation: moveStars 60s linear infinite;
}

@keyframes moveStars {
from {
transform: translateY(0px);
}
to {
transform: translateY(-1000px);
}
}

</style>

</head>

<body>
<audio id="music" loop>
  <source src="music.mp3" type="audio/mp3">
</audio>
<div class="stars"></div>

<div class="container">
<h1>Arunya</h1>
<p>உனக்காக...</p>
<p>I made something for you</p>

<button onclick="next()">Click here</button>
</div>

<script>
function next(){
document.getElementById("music").play();
}
</script>

</body>
</html>
