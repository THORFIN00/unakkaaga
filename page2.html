<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unakkaaga</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family: Arial, sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
opacity:0;
animation: fadeIn 2s forwards;
}

/* stars */

.stars {
position:absolute;
width:1px;
height:1px;
background:transparent;
box-shadow:
100px 200px #fff,
200px 300px #fff,
300px 100px #fff,
400px 400px #fff,
500px 200px #fff,
600px 300px #fff,
700px 150px #fff,
800px 250px #fff,
900px 350px #fff,
1000px 100px #fff,
1100px 200px #fff,
1200px 300px #fff;
animation: moveStars 60s linear infinite;
}

@keyframes moveStars {
from {
transform: translateY(0px);
}
to {
transform: translateY(-1000px);
}
}

.container{
max-width:700px;
text-align:center;
padding:20px;
z-index:2;
}

h1{
font-size:40px;
margin-bottom:20px;
}

p{
line-height:1.8;
font-size:18px;
opacity:0.8;
}

button{
margin-top:30px;
padding:12px 25px;
background:transparent;
border:1px solid white;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:white;
color:black;
}

@keyframes fadeIn{
to{
opacity:1;
}
}

</style>

</head>

<body>

<div class="stars"></div>

<audio id="music" autoplay loop>
<source src="music.mp3" type="audio/mp3">
</audio>

<div class="container">

<h1>Arunya</h1>

<p>
Write your text here...
</p>

<button onclick="next()">Continue</button>

</div>

<script>

function next(){
document.body.style.opacity="0";

setTimeout(function(){
window.location.href="page3.html";
},1500);

}

</script>

</body>
</html>
